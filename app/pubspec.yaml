name: app
description: "Ungie mesh network app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Your mesh logic — referenced locally
  ungie:
    path: ../

  # BLE scanning and advertising
  flutter_blue_plus: ^2.2.0

  # Google Nearby Connections — device discovery + data transfer
  nearby_connections: ^4.1.0

  # Runtime permissions — required for BLE on Android 12+
  permission_handler: ^11.3.1

  # Crypto
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
