
<style>
  .net-section { padding: 1.5rem 0 1rem; }
  .net-label { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 8px; }
  .btn-row { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }
  button { font-size: 13px; padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; transition: background 0.15s; }
  button:hover { background: var(--color-background-secondary); }
  button.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  #status-bar { font-size: 13px; color: var(--color-text-secondary); min-height: 20px; margin-top: 8px; }
  .mode-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
</style>

<h2 class="sr-only">Interactive comparison of centralized vs mesh network topologies</h2>

<div class="btn-row">
  <button id="btn-central" class="active" onclick="setMode('central')">Centralized (normal internet)</button>
  <button id="btn-mesh" onclick="setMode('mesh')">Mesh (your project)</button>
</div>

<div id="status-bar">Click a phone to see what happens when it sends a message.</div>

<svg id="net-svg" width="100%" viewBox="0 0 680 340" role="img">
  <title>Network topology diagram</title>
  <desc>Shows centralized vs mesh network connection patterns</desc>
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <g id="net-content"></g>
</svg>

<script>
const svg = document.getElementById('net-content');
const statusBar = document.getElementById('status-bar');
let mode = 'central';
let serverAlive = true;
let deadPhone = null;

const PURPLE = '#7F77DD';
const TEAL = '#1D9E75';
const CORAL = '#D85A30';
const GRAY = '#888780';
const AMBER = '#BA7517';

function phone(x, y, id, label) {
  return `<g id="ph-${id}" style="cursor:pointer" onclick="clickPhone('${id}')">
    <rect x="${x-22}" y="${y-14}" width="44" height="28" rx="6" fill="var(--color-background-secondary)" stroke="${GRAY}" stroke-width="0.5"/>
    <text x="${x}" y="${y+3}" text-anchor="middle" font-size="12" font-weight="500" fill="var(--color-text-primary)">${label}</text>
  </g>`;
}

function server(x, y) {
  return `<g id="server-node" style="cursor:pointer" onclick="clickServer()">
    <rect x="${x-26}" y="${y-18}" width="52" height="36" rx="8" fill="${mode==='central'&&serverAlive ? PURPLE+'22' : '#88878020'}" stroke="${mode==='central'&&serverAlive ? PURPLE : GRAY}" stroke-width="${mode==='central'&&serverAlive?1:0.5}"/>
    <text x="${x}" y="${y+5}" text-anchor="middle" font-size="11" font-weight="500" fill="${mode==='central'&&serverAlive ? PURPLE : GRAY}">server</text>
    ${!serverAlive ? `<line x1="${x-18}" y1="${y-12}" x2="${x+18}" y2="${y+12}" stroke="${CORAL}" stroke-width="1.5"/>` : ''}
  </g>`;
}

function line(x1,y1,x2,y2,color,dashed,id) {
  return `<line id="${id||'l'+Math.random()}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="1" stroke-opacity="0.5" ${dashed?'stroke-dasharray="4 3"':''} marker-end="url(#arr2)"/>`;
}

function drawCentral() {
  const sx=340, sy=80;
  const phones = [
    {x:100,y:240,id:'A',label:'A'},
    {x:220,y:270,id:'B',label:'B'},
    {x:340,y:280,id:'C',label:'C'},
    {x:460,y:270,id:'D',label:'D'},
    {x:580,y:240,id:'E',label:'E'},
  ];
  let html = server(sx, sy);
  phones.forEach(p => {
    const col = serverAlive ? (p.id===deadPhone?CORAL:TEAL+'88') : CORAL+'44';
    html += `<line x1="${sx}" y1="${sy+18}" x2="${p.x}" y2="${p.y-14}" stroke="${serverAlive&&p.id!==deadPhone?TEAL:CORAL}" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="${serverAlive&&p.id!==deadPhone?'':'5 3'}"/>`;
  });
  phones.forEach(p => {
    html += phone(p.x, p.y, p.id, p.label);
    if (p.id === deadPhone) {
      html += `<line x1="${p.x-16}" y1="${p.y-10}" x2="${p.x+16}" y2="${p.y+10}" stroke="${CORAL}" stroke-width="1.5"/>`;
    }
  });
  if (!serverAlive) {
    html += `<text x="${sx}" y="${sy+50}" text-anchor="middle" font-size="11" fill="${CORAL}">network down</text>`;
  }
  svg.innerHTML = html;
}

function drawMesh() {
  const phones = [
    {x:120,y:90, id:'A',label:'A'},
    {x:300,y:60, id:'B',label:'B'},
    {x:500,y:90, id:'C',label:'C'},
    {x:160,y:240,id:'D',label:'D'},
    {x:340,y:270,id:'E',label:'E'},
    {x:530,y:240,id:'F',label:'F'},
  ];
  const edges = [
    ['A','B'],['B','C'],['A','D'],['B','E'],['C','F'],
    ['D','E'],['E','F'],['B','D'],['C','E'],['A','E'],
  ];
  let html = '';
  edges.forEach(([a,b]) => {
    const pa = phones.find(p=>p.id===a);
    const pb = phones.find(p=>p.id===b);
    const dead = pa.id===deadPhone||pb.id===deadPhone;
    html += `<line x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}" stroke="${dead?CORAL:TEAL}" stroke-width="1" stroke-opacity="${dead?0.25:0.35}" stroke-dasharray="${dead?'4 3':''}"/>`;
  });
  phones.forEach(p => {
    html += phone(p.x, p.y, p.id, p.label);
    if (p.id === deadPhone) {
      html += `<line x1="${p.x-16}" y1="${p.y-10}" x2="${p.x+16}" y2="${p.y+10}" stroke="${CORAL}" stroke-width="1.5"/>`;
    }
  });
  if (deadPhone) {
    const alive = phones.filter(p=>p.id!==deadPhone);
    html += `<text x="340" y="315" text-anchor="middle" font-size="11" fill="${TEAL}">other ${alive.length} phones still connected to each other</text>`;
  }
  svg.innerHTML = html;
}

function render() {
  if (mode==='central') drawCentral(); else drawMesh();
}

function setMode(m) {
  mode = m;
  serverAlive = true;
  deadPhone = null;
  document.getElementById('btn-central').classList.toggle('active', m==='central');
  document.getElementById('btn-mesh').classList.toggle('active', m==='mesh');
  statusBar.textContent = 'Click a phone (or the server) to simulate failure.';
  render();
}

function clickServer() {
  if (mode !== 'central') return;
  serverAlive = !serverAlive;
  deadPhone = null;
  statusBar.textContent = serverAlive
    ? 'Server restored. All phones reconnected.'
    : 'Server is down. Every phone loses access — even phones that can physically reach each other.';
  render();
}

function clickPhone(id) {
  deadPhone = deadPhone === id ? null : id;
  if (mode === 'central') {
    statusBar.textContent = deadPhone
      ? `Phone ${id} is offline. It can't reach the server — even if Phone A is standing right next to it.`
      : 'Phone restored.';
  } else {
    statusBar.textContent = deadPhone
      ? `Phone ${id} dropped out. The mesh re-routes automatically. Other phones still talk to each other.`
      : 'Phone restored. Mesh reconnected.';
  }
  render();
}

render();
statusBar.textContent = 'Click the server or any phone to simulate failure.';
</script>
