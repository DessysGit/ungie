
<style>
  button { font-size:13px; padding:6px 14px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:var(--color-background-primary); color:var(--color-text-primary); cursor:pointer; }
  button:hover { background:var(--color-background-secondary); }
  button.active { background:var(--color-background-info); color:var(--color-text-info); border-color:var(--color-border-info); }
  .btn-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  #desc { font-size:13px; color:var(--color-text-secondary); min-height:52px; line-height:1.6; margin-bottom:6px; }
</style>

<h2 class="sr-only">Interactive Merkle tree sync between two phones</h2>

<div class="btn-row">
  <button class="active" onclick="setStep(0)">Both in sync</button>
  <button onclick="setStep(1)">Phone B gets new data</button>
  <button onclick="setStep(2)">Compare roots</button>
  <button onclick="setStep(3)">Drill down</button>
  <button onclick="setStep(4)">Push missing item</button>
</div>
<div id="desc">Both phones have the same 4 data items. Their Merkle trees are identical — root hashes match. No sync needed.</div>

<svg width="100%" viewBox="0 0 680 360" role="img">
  <title>Merkle tree synchronization diagram</title>
  <desc>Two phones comparing Merkle trees to find which data items differ</desc>
  <defs>
    <marker id="ma" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Labels -->
  <text x="170" y="28" text-anchor="middle" font-size="12" font-weight="500" fill="var(--color-text-secondary)">Phone A</text>
  <text x="510" y="28" text-anchor="middle" font-size="12" font-weight="500" fill="var(--color-text-secondary)">Phone B</text>

  <!-- === PHONE A TREE === -->
  <!-- Root -->
  <g id="a-root">
    <rect x="110" y="40" width="120" height="34" rx="6" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="170" y="57" text-anchor="middle" font-size="10" font-weight="500" fill="var(--color-text-secondary)" id="a-root-label">root: a1b2c3</text>
  </g>
  <!-- Branch left -->
  <g id="a-bl">
    <rect x="60" y="110" width="100" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="110" y="129" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">left: f3a9</text>
  </g>
  <!-- Branch right -->
  <g id="a-br">
    <rect x="180" y="110" width="100" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="230" y="129" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">right: 77cd</text>
  </g>
  <!-- Leaf A1 -->
  <g id="a-l1">
    <rect x="40" y="180" width="80" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="80" y="199" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">"hello"</text>
  </g>
  <!-- Leaf A2 -->
  <g id="a-l2">
    <rect x="140" y="180" width="80" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="180" y="199" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">"42pts"</text>
  </g>
  <!-- Leaf A3 -->
  <g id="a-l3">
    <rect x="60" y="250" width="80" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="100" y="269" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">"q3ans"</text>
  </g>
  <!-- Leaf A4 -->
  <g id="a-l4">
    <rect x="160" y="250" width="80" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="200" y="269" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">"img01"</text>
  </g>

  <!-- A tree connectors -->
  <line x1="170" y1="74" x2="110" y2="110" stroke="#88878060" stroke-width="0.5"/>
  <line x1="170" y1="74" x2="230" y2="110" stroke="#88878060" stroke-width="0.5"/>
  <line x1="110" y1="140" x2="80"  y2="180" stroke="#88878060" stroke-width="0.5"/>
  <line x1="110" y1="140" x2="180" y2="180" stroke="#88878060" stroke-width="0.5"/>
  <line x1="230" y1="140" x2="100" y2="250" stroke="#88878060" stroke-width="0.5"/>
  <line x1="230" y1="140" x2="200" y2="250" stroke="#88878060" stroke-width="0.5"/>

  <!-- === PHONE B TREE === -->
  <g id="b-root">
    <rect x="450" y="40" width="120" height="34" rx="6" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="510" y="57" text-anchor="middle" font-size="10" font-weight="500" fill="var(--color-text-secondary)" id="b-root-label">root: a1b2c3</text>
  </g>
  <g id="b-bl">
    <rect x="400" y="110" width="100" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="450" y="129" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">left: f3a9</text>
  </g>
  <g id="b-br">
    <rect x="520" y="110" width="100" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text id="b-br-label" x="570" y="129" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">right: 77cd</text>
  </g>
  <g id="b-l1">
    <rect x="380" y="180" width="80" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="420" y="199" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">"hello"</text>
  </g>
  <g id="b-l2">
    <rect x="480" y="180" width="80" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="520" y="199" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">"42pts"</text>
  </g>
  <g id="b-l3">
    <rect x="400" y="250" width="80" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text x="440" y="269" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">"q3ans"</text>
  </g>
  <g id="b-l4">
    <rect x="500" y="250" width="100" height="30" rx="5" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="0.5"/>
    <text id="b-l4-label" x="550" y="269" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">"img01"</text>
  </g>

  <line x1="510" y1="74" x2="450" y2="110" stroke="#88878060" stroke-width="0.5"/>
  <line x1="510" y1="74" x2="570" y2="110" stroke="#88878060" stroke-width="0.5"/>
  <line x1="450" y1="140" x2="420" y2="180" stroke="#88878060" stroke-width="0.5"/>
  <line x1="450" y1="140" x2="520" y2="180" stroke="#88878060" stroke-width="0.5"/>
  <line x1="570" y1="140" x2="440" y2="250" stroke="#88878060" stroke-width="0.5"/>
  <line x1="570" y1="140" x2="550" y2="250" stroke="#88878060" stroke-width="0.5"/>

  <!-- Middle channel (root compare arrow, drill arrow, push arrow) -->
  <g id="compare-arrow" style="opacity:0">
    <line x1="240" y1="57" x2="440" y2="57" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ma)" marker-start="url(#ma)"/>
    <text x="340" y="48" text-anchor="middle" font-size="10" fill="#BA7517">compare roots</text>
  </g>
  <g id="mismatch-label" style="opacity:0">
    <rect x="278" y="68" width="124" height="22" rx="4" fill="var(--color-background-secondary)" stroke="#D85A30" stroke-width="0.5"/>
    <text x="340" y="83" text-anchor="middle" font-size="10" fill="#D85A30">roots differ — sync needed</text>
  </g>
  <g id="drill-arrow" style="opacity:0">
    <line x1="290" y1="125" x2="390" y2="125" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ma)" marker-start="url(#ma)"/>
    <text x="340" y="116" text-anchor="middle" font-size="10" fill="#BA7517">compare branches</text>
    <rect x="278" y="132" width="124" height="20" rx="4" fill="var(--color-background-secondary)" stroke="#1D9E75" stroke-width="0.5"/>
    <text x="340" y="146" text-anchor="middle" font-size="10" fill="#1D9E75">left matches — skip</text>
  </g>
  <g id="push-arrow" style="opacity:0">
    <line x1="590" y1="265" x2="250" y2="265" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#ma)"/>
    <text x="420" y="255" text-anchor="middle" font-size="10" fill="#1D9E75">push "newdata" to A</text>
  </g>

</svg>

<script>
const TEAL='#1D9E75', CORAL='#D85A30', AMBER='#BA7517', PURPLE='#7F77DD', GRAY='#888780';

const steps = [
  {
    desc: "Both phones have the same 4 data items. Their Merkle trees are identical — root hashes match. No sync needed. Zero bandwidth wasted.",
    bRootHash:'a1b2c3', bBrHash:'77cd', bL4:'img01',
    highlight:{}, compare:0, mismatch:0, drill:0, push:0,
    bRootColor:GRAY, bBrColor:GRAY, bL4Color:GRAY, aRootColor:GRAY
  },
  {
    desc: "Phone B receives a new data item: 'newdata'. It hashes it, rebuilds the right branch hash (now 'e5f1'), and recomputes the root (now 'x9z4'). Phone A doesn't have this yet.",
    bRootHash:'x9z4', bBrHash:'e5f1', bL4:'newdata',
    highlight:{bRoot:AMBER, bBr:AMBER, bL4:TEAL}, compare:0, mismatch:0, drill:0, push:0,
    bRootColor:AMBER, bBrColor:AMBER, bL4Color:TEAL, aRootColor:GRAY
  },
  {
    desc: "Phones meet. They exchange just their root hashes — one tiny number each. A has 'a1b2c3', B has 'x9z4'. They don't match. Something is different. Sync is needed — but we don't know what yet.",
    bRootHash:'x9z4', bBrHash:'e5f1', bL4:'newdata',
    highlight:{bRoot:CORAL, aRoot:CORAL}, compare:1, mismatch:1, drill:0, push:0,
    bRootColor:CORAL, bBrColor:AMBER, bL4Color:TEAL, aRootColor:CORAL
  },
  {
    desc: "Drill down one level. Compare left branches: both say 'f3a9' — identical, skip entirely. Compare right branches: A says '77cd', B says 'e5f1' — mismatch found. The difference is somewhere in the right subtree.",
    bRootHash:'x9z4', bBrHash:'e5f1', bL4:'newdata',
    highlight:{bBr:CORAL, aBr:CORAL}, compare:0, mismatch:0, drill:1, push:0,
    bRootColor:AMBER, bBrColor:CORAL, bL4Color:TEAL, aRootColor:AMBER
  },
  {
    desc: "Drill further — compare the right branch's leaves. 'q3ans' matches. 'newdata' vs 'img01' — found it. Phone B pushes just that one item to Phone A. Done. Two root hashes + two branch hashes exchanged. Only one item transferred.",
    bRootHash:'x9z4', bBrHash:'e5f1', bL4:'newdata',
    highlight:{bL4:TEAL, push:1}, compare:0, mismatch:0, drill:0, push:1,
    bRootColor:AMBER, bBrColor:AMBER, bL4Color:TEAL, aRootColor:AMBER
  }
];

function styleNode(id, color) {
  const g = document.getElementById(id);
  if (!g) return;
  const rect = g.querySelector('rect');
  if (rect) rect.setAttribute('stroke', color || GRAY);
  if (rect) rect.setAttribute('stroke-width', color && color !== GRAY ? '1.5' : '0.5');
}

function setStep(i) {
  const s = steps[i];
  document.getElementById('desc').textContent = s.desc;
  document.getElementById('b-root-label').textContent = 'root: ' + s.bRootHash;
  document.getElementById('b-root-label').setAttribute('fill', s.bRootColor);
  document.getElementById('b-br-label').textContent = 'right: ' + s.bBrHash;
  document.getElementById('b-br-label').setAttribute('fill', s.bBrColor);
  document.getElementById('b-l4-label').textContent = '"' + s.bL4 + '"';
  document.getElementById('b-l4-label').setAttribute('fill', s.bL4Color);
  document.getElementById('a-root-label').setAttribute('fill', s.aRootColor);

  styleNode('b-root', s.bRootColor);
  styleNode('b-br', s.bBrColor);
  styleNode('b-l4', s.bL4Color);
  styleNode('a-root', s.aRootColor);
  styleNode('a-br', s.highlight.aBr || GRAY);
  styleNode('b-bl', GRAY);

  document.getElementById('compare-arrow').style.opacity = s.compare;
  document.getElementById('mismatch-label').style.opacity = s.mismatch;
  document.getElementById('drill-arrow').style.opacity = s.drill;
  document.getElementById('push-arrow').style.opacity = s.push;

  document.querySelectorAll('.btn-row button').forEach((b,j) => b.classList.toggle('active', j===i));
}
</script>
