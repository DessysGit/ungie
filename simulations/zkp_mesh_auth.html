
<style>
  button { font-size:13px; padding:6px 14px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:var(--color-background-primary); color:var(--color-text-primary); cursor:pointer; }
  button:hover { background: var(--color-background-secondary); }
  button.active { background:var(--color-background-info); color:var(--color-text-info); border-color:var(--color-border-info); }
  .btn-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  #zkp-desc { font-size:13px; color:var(--color-text-secondary); min-height:60px; line-height:1.6; margin-bottom:4px; }
  #round-counter { font-size:12px; color:var(--color-text-tertiary); margin-bottom:8px; }
  .sim-btn { background:var(--color-background-secondary); }
</style>

<h2 class="sr-only">Zero-knowledge proof membership simulation for mesh network</h2>

<div class="btn-row">
  <button class="active" onclick="setScene(0)">The cave setup</button>
  <button onclick="setScene(1)">Prover enters</button>
  <button onclick="setScene(2)">Verifier challenges</button>
  <button onclick="setScene(3)">Prover responds</button>
  <button onclick="setScene(4)">In the mesh</button>
</div>
<div id="zkp-desc">Two paths, one locked door in the middle. The prover claims to know the door code. The verifier wants proof — without learning the code.</div>
<div id="round-counter"></div>

<svg width="100%" viewBox="0 0 680 310" role="img" id="zkp-svg">
  <title>Zero knowledge proof cave diagram</title>
  <desc>A circular cave with two paths and a locked door illustrating zero knowledge proofs</desc>
  <defs>
    <marker id="zkpa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Cave outer shape -->
  <ellipse cx="340" cy="200" rx="240" ry="110" fill="none" stroke="var(--color-border-secondary)" stroke-width="1"/>

  <!-- Cave entrance (bottom) -->
  <rect x="316" y="290" width="48" height="22" rx="0" fill="var(--color-background-primary)" stroke="none"/>
  <line x1="316" y1="290" x2="316" y2="310" stroke="var(--color-border-secondary)" stroke-width="1"/>
  <line x1="364" y1="290" x2="364" y2="310" stroke="var(--color-border-secondary)" stroke-width="1"/>
  <text x="340" y="308" text-anchor="middle" font-size="10" fill="var(--color-text-tertiary)">entrance</text>

  <!-- Left path label -->
  <text x="175" y="210" text-anchor="middle" font-size="11" fill="var(--color-text-secondary)">Path L</text>
  <!-- Right path label -->
  <text x="505" y="210" text-anchor="middle" font-size="11" fill="var(--color-text-secondary)">Path R</text>

  <!-- Door in the middle -->
  <g id="door-group">
    <rect x="322" y="158" width="36" height="54" rx="3" fill="var(--color-background-secondary)" stroke="#888780" stroke-width="1" id="door-rect"/>
    <circle cx="340" cy="186" r="3" fill="#888780" id="door-lock"/>
    <text x="340" y="228" text-anchor="middle" font-size="10" fill="var(--color-text-tertiary)" id="door-label">locked</text>
  </g>

  <!-- Divider line -->
  <line x1="340" y1="100" x2="340" y2="158" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="340" y1="212" x2="340" y2="290" stroke="var(--color-border-tertiary)" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- Prover figure (starts at entrance) -->
  <g id="prover" style="transition: transform 0.5s">
    <circle cx="340" cy="270" r="10" fill="#7F77DD" fill-opacity="0.2" stroke="#7F77DD" stroke-width="1"/>
    <text x="340" y="274" text-anchor="middle" font-size="9" font-weight="500" fill="#7F77DD">P</text>
    <text x="340" y="290" text-anchor="middle" font-size="9" fill="#7F77DD" id="prover-label">prover</text>
  </g>

  <!-- Verifier outside -->
  <g id="verifier">
    <circle cx="340" cy="340" r="10" fill="#1D9E75" fill-opacity="0.2" stroke="#1D9E75" stroke-width="1"/>
    <text x="340" y="344" text-anchor="middle" font-size="9" font-weight="500" fill="#1D9E75">V</text>
  </g>

  <!-- Challenge arrow (hidden initially) -->
  <g id="challenge-arrow" style="opacity:0">
    <line x1="340" y1="330" x2="260" y2="295" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#zkpa)"/>
    <text x="270" y="322" text-anchor="middle" font-size="10" fill="#BA7517" id="challenge-text">come out LEFT</text>
  </g>

  <!-- Success badge -->
  <g id="success-badge" style="opacity:0">
    <rect x="260" y="108" width="160" height="28" rx="6" fill="var(--color-background-secondary)" stroke="#1D9E75" stroke-width="1"/>
    <text x="340" y="126" text-anchor="middle" font-size="11" font-weight="500" fill="#1D9E75" id="success-text">Round 1 passed</text>
  </g>

  <!-- Mesh scene (scene 4) -->
  <g id="mesh-scene" style="opacity:0">
    <!-- Phone A -->
    <rect x="80" y="100" width="100" height="60" rx="8" fill="var(--color-background-secondary)" stroke="#7F77DD" stroke-width="1"/>
    <text x="130" y="128" text-anchor="middle" font-size="11" font-weight="500" fill="#7F77DD">Phone A</text>
    <text x="130" y="146" text-anchor="middle" font-size="9" fill="#7F77DD">has token</text>
    <!-- Phone B -->
    <rect x="290" y="80" width="100" height="60" rx="8" fill="var(--color-background-secondary)" stroke="#7F77DD" stroke-width="1"/>
    <text x="340" y="108" text-anchor="middle" font-size="11" font-weight="500" fill="#7F77DD">Phone B</text>
    <text x="340" y="126" text-anchor="middle" font-size="9" fill="#7F77DD">has token</text>
    <!-- Stranger -->
    <rect x="490" y="100" width="110" height="60" rx="8" fill="var(--color-background-secondary)" stroke="#D85A30" stroke-width="1"/>
    <text x="545" y="128" text-anchor="middle" font-size="11" font-weight="500" fill="#D85A30">stranger</text>
    <text x="545" y="146" text-anchor="middle" font-size="9" fill="#D85A30">no token</text>
    <!-- A-B connection -->
    <line x1="180" y1="130" x2="290" y2="118" stroke="#1D9E75" stroke-width="1.5"/>
    <text x="235" y="112" text-anchor="middle" font-size="9" fill="#1D9E75">ZKP passed</text>
    <!-- B-stranger rejected -->
    <line x1="390" y1="118" x2="490" y2="128" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="440" y="108" text-anchor="middle" font-size="9" fill="#D85A30">proof failed</text>
    <!-- Packets flowing A-B -->
    <line x1="180" y1="145" x2="290" y2="145" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#zkpa)"/>
    <!-- Blocked -->
    <line x1="490" y1="148" x2="395" y2="148" stroke="#D85A30" stroke-width="1" marker-end="url(#zkpa)"/>
    <rect x="420" y="155" width="50" height="18" rx="4" fill="var(--color-background-secondary)" stroke="#D85A30" stroke-width="0.5"/>
    <text x="445" y="167" text-anchor="middle" font-size="9" fill="#D85A30">blocked</text>

    <!-- What IS revealed label -->
    <rect x="80" y="200" width="520" height="86" rx="8" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
    <text x="340" y="220" text-anchor="middle" font-size="11" font-weight="500" fill="var(--color-text-primary)">What the mesh learns from a valid proof</text>
    <text x="340" y="240" text-anchor="middle" font-size="10" fill="#1D9E75">"This device holds a valid class token"</text>
    <text x="340" y="258" text-anchor="middle" font-size="10" fill="var(--color-text-secondary)">What it does NOT learn: which student, which device, which seat</text>
    <text x="340" y="276" text-anchor="middle" font-size="10" fill="var(--color-text-tertiary)">Identity is never transmitted — only proof of membership</text>
  </g>
</svg>

<script>
const PURPLE='#7F77DD', TEAL='#1D9E75', CORAL='#D85A30', AMBER='#BA7517', GRAY='#888780';

const scenes = [
  {
    desc: "A circular cave, one entrance, one locked door splitting it into left and right paths. The Prover (P) claims to know the door code. The Verifier (V) stands outside — they want proof, but the Prover refuses to just say the code out loud.",
    proverPos: {cx:340, cy:270}, proverLabel:'prover',
    doorColor: GRAY, doorLocked: true,
    challengeOp:0, successOp:0, meshOp:0, caveOp:1,
    counter:''
  },
  {
    desc: "P enters the cave and walks to either the left or right path — V cannot see which one. This is the commitment step. P is now committed to a path, but V has no idea which one.",
    proverPos: {cx:220, cy:200}, proverLabel:'went left (V can\'t see)',
    doorColor: GRAY, doorLocked: true,
    challengeOp:0, successOp:0, meshOp:0, caveOp:1,
    counter:''
  },
  {
    desc: "V shouts a random challenge from outside: 'Come out from the RIGHT!' V picks randomly — left or right. P must now come out from whichever side V called, regardless of where P originally went.",
    proverPos: {cx:220, cy:200}, proverLabel:'inside',
    doorColor: GRAY, doorLocked: true,
    challengeOp:1, successOp:0, meshOp:0, caveOp:1,
    counter:'', challengeText:'come out RIGHT'
  },
  {
    desc: "P knows the door code — so P opens the door, crosses to the right side, and exits correctly. If P did NOT know the code, they'd be stuck on the left and caught immediately. Repeat 20 times: probability of guessing all correctly = 1 in 1,048,576.",
    proverPos: {cx:480, cy:270}, proverLabel:'exited RIGHT ✓',
    doorColor: TEAL, doorLocked: false,
    challengeOp:0, successOp:1, meshOp:0, caveOp:1,
    counter:'Repeat this 20 times → 1-in-a-million chance of cheating', successText:'Round 1 passed — 19 to go'
  },
  {
    desc: "In your mesh: two phones meet and run this protocol automatically in milliseconds using cryptographic math — no literal cave needed. A valid token = join the mesh. No token = silently blocked. And crucially: the verifying phone never learns which student it's talking to.",
    proverPos: {cx:340, cy:270}, proverLabel:'',
    doorColor: GRAY, doorLocked: true,
    challengeOp:0, successOp:0, meshOp:1, caveOp:0,
    counter:''
  }
];

function setScene(i) {
  const s = scenes[i];
  document.getElementById('zkp-desc').textContent = s.desc;
  document.getElementById('round-counter').textContent = s.counter || '';

  const prover = document.getElementById('prover');
  const pc = prover.querySelector('circle');
  const pt = prover.querySelector('text');
  const pl = document.getElementById('prover-label');
  pc.setAttribute('cx', s.proverPos.cx);
  pc.setAttribute('cy', s.proverPos.cy);
  pt.setAttribute('x', s.proverPos.cx);
  pt.setAttribute('y', s.proverPos.cy + 4);
  pl.setAttribute('x', s.proverPos.cx);
  pl.setAttribute('y', s.proverPos.cy + 18);
  pl.textContent = s.proverLabel;

  const doorRect = document.getElementById('door-rect');
  const doorLock = document.getElementById('door-lock');
  doorRect.setAttribute('stroke', s.doorColor);
  doorLock.setAttribute('fill', s.doorLocked ? GRAY : TEAL);

  document.getElementById('challenge-arrow').style.opacity = s.challengeOp;
  if (s.challengeText) document.getElementById('challenge-text').textContent = s.challengeText;
  document.getElementById('success-badge').style.opacity = s.successOp;
  if (s.successText) document.getElementById('success-text').textContent = s.successText;
  document.getElementById('mesh-scene').style.opacity = s.meshOp;

  const caveEls = ['door-group','prover','verifier'];
  const caveShapes = document.querySelectorAll('#zkp-svg > ellipse, #zkp-svg > line, #zkp-svg > rect, #zkp-svg > text');
  document.getElementById('prover').style.opacity = s.meshOp ? 0 : 1;
  document.getElementById('verifier').style.opacity = s.meshOp ? 0 : 1;
  document.getElementById('door-group').style.opacity = s.meshOp ? 0 : 1;

  document.querySelectorAll('.btn-row button').forEach((b,j) => b.classList.toggle('active', j===i));
}
</script>
