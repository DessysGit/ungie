
<style>
  button { font-size:13px; padding:6px 14px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:var(--color-background-primary); color:var(--color-text-primary); cursor:pointer; }
  button:hover { background:var(--color-background-secondary); }
  button.active { background:var(--color-background-info); color:var(--color-text-info); border-color:var(--color-border-info); }
  .controls { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  .ctrl-label { font-size:12px; color:var(--color-text-secondary); }
  #sw-desc { font-size:13px; color:var(--color-text-secondary); min-height:52px; line-height:1.6; margin-bottom:6px; }
  #battery-readout { font-size:12px; color:var(--color-text-tertiary); margin-top:4px; }
</style>

<h2 class="sr-only">Sleep wake duty cycle simulator for mesh network battery optimization</h2>

<div class="controls">
  <span class="ctrl-label">Duty cycle</span>
  <input type="range" min="5" max="80" value="20" id="duty-slider" style="width:140px" oninput="update()">
  <span id="duty-val" style="font-size:13px;font-weight:500;min-width:32px">20%</span>
  <span class="ctrl-label" style="margin-left:8px">Sync offset B</span>
  <input type="range" min="0" max="95" value="10" id="offset-slider" style="width:140px" oninput="update()">
  <span id="offset-val" style="font-size:13px;font-weight:500;min-width:32px">10%</span>
</div>

<div id="sw-desc">Each bar is one 1-second cycle. Green = awake (radio on). Gray = asleep. Overlap windows — when both phones are awake simultaneously — are where gossip can happen.</div>

<svg width="100%" viewBox="0 0 680 260" role="img" id="sw-svg">
  <title>Sleep wake cycle duty cycle visualization</title>
  <desc>Two phones showing their sleep and wake periods across time, with overlap windows highlighted</desc>

  <!-- Row labels -->
  <text x="52" y="58" text-anchor="end" font-size="11" font-weight="500" fill="var(--color-text-secondary)">Phone A</text>
  <text x="52" y="118" text-anchor="end" font-size="11" font-weight="500" fill="var(--color-text-secondary)">Phone B</text>
  <text x="52" y="178" text-anchor="end" font-size="11" font-weight="500" fill="var(--color-text-secondary)">Overlap</text>

  <!-- Time axis -->
  <line x1="60" y1="200" x2="640" y2="200" stroke="var(--color-border-tertiary)" stroke-width="0.5"/>
  <text x="60"  y="215" font-size="9" fill="var(--color-text-tertiary)" text-anchor="middle">0s</text>
  <text x="205" y="215" font-size="9" fill="var(--color-text-tertiary)" text-anchor="middle">1s</text>
  <text x="350" y="215" font-size="9" fill="var(--color-text-tertiary)" text-anchor="middle">2s</text>
  <text x="495" y="215" font-size="9" fill="var(--color-text-tertiary)" text-anchor="middle">3s</text>
  <text x="640" y="215" font-size="9" fill="var(--color-text-tertiary)" text-anchor="middle">4s</text>

  <g id="bars-a"></g>
  <g id="bars-b"></g>
  <g id="bars-overlap"></g>
  <g id="overlap-labels"></g>
</svg>

<div id="battery-readout"></div>
<div id="overlap-readout" style="font-size:12px; color:var(--color-text-secondary); margin-top:2px;"></div>

<script>
const W = 580, X0 = 60, CYCLES = 4;

function update() {
  const duty = parseInt(document.getElementById('duty-slider').value);
  const offset = parseInt(document.getElementById('offset-slider').value);
  document.getElementById('duty-val').textContent = duty + '%';
  document.getElementById('offset-val').textContent = offset + '%';

  const barsA = document.getElementById('bars-a');
  const barsB = document.getElementById('bars-b');
  const barsOv = document.getElementById('bars-overlap');
  const ovLabels = document.getElementById('overlap-labels');
  barsA.innerHTML = ''; barsB.innerHTML = ''; barsOv.innerHTML = ''; ovLabels.innerHTML = '';

  const cycleW = W / CYCLES;
  const wakeW = cycleW * duty / 100;
  const offsetW = cycleW * offset / 100;

  const TEAL = '#1D9E75', GRAY = '#B4B2A9', AMBER = '#EF9F27', OVCOLOR = '#7F77DD';
  let totalOverlap = 0;
  let overlapCount = 0;

  for (let c = 0; c < CYCLES; c++) {
    const cx = X0 + c * cycleW;

    // Phone A: wakes at start of each cycle
    const aStart = cx;
    const aEnd = cx + wakeW;

    // Phone B: wakes at offset
    const bStart = cx + offsetW;
    const bEnd = cx + offsetW + wakeW;
    const bEndClamped = Math.min(bEnd, cx + cycleW);

    // Sleep bars A
    barsA.innerHTML += `<rect x="${aStart}" y="36" width="${wakeW}" height="28" rx="3" fill="${TEAL}" fill-opacity="0.7"/>`;
    barsA.innerHTML += `<rect x="${aStart+wakeW}" y="36" width="${cycleW-wakeW}" height="28" rx="3" fill="${GRAY}" fill-opacity="0.3"/>`;

    // Sleep bars B (may wrap, simplified: clamp)
    barsB.innerHTML += `<rect x="${bStart}" y="96" width="${Math.min(wakeW, cx+cycleW-bStart)}" height="28" rx="3" fill="${TEAL}" fill-opacity="0.7"/>`;
    barsB.innerHTML += `<rect x="${cx}" y="96" width="${offsetW}" height="28" rx="3" fill="${GRAY}" fill-opacity="0.3"/>`;
    if (bEnd > cx + cycleW) {
      barsB.innerHTML += `<rect x="${cx+cycleW}" y="96" width="${bEnd-(cx+cycleW)}" height="28" rx="3" fill="${TEAL}" fill-opacity="0.5"/>`;
    }
    const sleepStart2 = Math.min(bEnd, cx+cycleW);
    if (sleepStart2 < cx+cycleW)
      barsB.innerHTML += `<rect x="${sleepStart2}" y="96" width="${cx+cycleW-sleepStart2}" height="28" rx="3" fill="${GRAY}" fill-opacity="0.3"/>`;

    // Overlap: intersection of [aStart,aEnd] and [bStart,bEndClamped]
    const ovStart = Math.max(aStart, bStart);
    const ovEnd = Math.min(aEnd, bEndClamped);
    if (ovEnd > ovStart) {
      const ovW = ovEnd - ovStart;
      totalOverlap += ovW / cycleW;
      overlapCount++;
      barsOv.innerHTML += `<rect x="${ovStart}" y="156" width="${ovW}" height="28" rx="3" fill="${OVCOLOR}" fill-opacity="0.8"/>`;
      ovLabels.innerHTML += `<text x="${(ovStart+ovEnd)/2}" y="170" text-anchor="middle" font-size="9" fill="white">${Math.round(ovW/cycleW*100)}%</text>`;
    } else {
      barsOv.innerHTML += `<rect x="${cx}" y="156" width="${cycleW}" height="28" rx="3" fill="${GRAY}" fill-opacity="0.15"/>`;
      ovLabels.innerHTML += `<text x="${cx+cycleW/2}" y="170" text-anchor="middle" font-size="9" fill="var(--color-text-tertiary)">no overlap</text>`;
    }
  }

  const avgOverlap = Math.round(totalOverlap / CYCLES * 100);
  const batteryDrain = Math.round(duty * 0.7 + 8);
  const hoursLeft = Math.round(1000 / batteryDrain * 10) / 10;

  document.getElementById('battery-readout').textContent =
    `Estimated radio power: ${batteryDrain}% of baseline · ~${hoursLeft}h mesh participation per charge`;
  document.getElementById('overlap-readout').textContent =
    `Average overlap per cycle: ${avgOverlap}% — ${avgOverlap > 0 ? 'gossip CAN happen' : 'phones never meet — mesh breaks'}`;

  // Desc update
  const desc = duty <= 15
    ? "Very low duty cycle — battery efficient, but overlap windows are narrow. Gossip is slow. Good for background-only mode."
    : duty <= 40
    ? "Balanced duty cycle. Phones meet regularly, gossip flows well. This is your target range for active mesh sessions."
    : "High duty cycle — gossip is fast but battery drains quickly. Only sustainable for short bursts.";
  document.getElementById('sw-desc').textContent = desc + (avgOverlap === 0 ? " WARNING: offset too large — no overlap detected." : "");
}

update();
</script>
